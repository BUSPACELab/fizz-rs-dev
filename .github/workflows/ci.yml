# Build and test (includes building Fizz via getdeps in build.rs).
name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: build and test
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Fizz system dependencies (getdeps)
        working-directory: third_party/fizz
        run: |
          sudo python3 build/fbcode_builder/getdeps.py --allow-system-packages install-system-deps --recursive fizz

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test
